<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Moodify — An immersive mood-based music experience with a beat-reactive 3D orb.">
    <title>Moodify — Immersive Audio Space</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Animated Background Particles (CSS-only) -->
    <div class="bg-particles" id="bg-particles" aria-hidden="true"></div>

    <!-- 3D Orb Scene (CSS 3D Transforms) -->
    <div class="orb-scene" id="orb-scene">
        <div class="orb-wrapper" id="orb-wrapper">
            <!-- Outer glow layers -->
            <div class="orb-glow orb-glow--outer" id="orb-glow-outer"></div>
            <div class="orb-glow orb-glow--mid" id="orb-glow-mid"></div>
            <!-- Core sphere -->
            <div class="orb-core" id="orb-core"></div>
            <!-- Ripple ring -->
            <div class="orb-ripple" id="orb-ripple"></div>
            <!-- Satellites (generated by JS) -->
            <div class="satellites" id="satellites-container"></div>
        </div>
    </div>

    <!-- Overlay Grid UI -->
    <div class="app-grid">
        
        <!-- Left Sidebar: Mood Controls -->
        <aside class="sidebar glass-panel" id="sidebar">
            <header class="header">
                <div class="logo">Moodify</div>
                <p class="subtitle">Your emotional universe</p>
            </header>

            <div class="mood-section">
                <h2 class="section-title">Your Mood</h2>
                <div class="mood-list" id="mood-list">
                    <button class="mood-btn active" data-mood="energetic" id="mood-energetic">
                        <span class="icon">⚡</span> Energetic
                    </button>
                    <button class="mood-btn" data-mood="happy" id="mood-happy">
                        <span class="icon">☀️</span> Happy
                    </button>
                    <button class="mood-btn" data-mood="focus" id="mood-focus">
                        <span class="icon">🎯</span> Focus
                    </button>
                    <button class="mood-btn" data-mood="chill" id="mood-chill">
                        <span class="icon">☁️</span> Chill
                    </button>
                    <button class="mood-btn" data-mood="sad" id="mood-sad">
                        <span class="icon">🌧️</span> Sad
                    </button>
                </div>
            </div>

            <div class="status-box">
                <p class="ai-status" id="ai-status">Vibing to Energetic Energy</p>
            </div>
        </aside>

        <!-- Center Area: Transparent spacer for the 3D Orb -->
        <main class="center-focus">
            <div class="interaction-hint" id="center-hint">Click the orb to expand</div>
        </main>

        <!-- Right Sidebar: Music Player -->
        <aside class="player-sidebar glass-panel" id="player-sidebar">
            <h2 class="section-title">Now Playing</h2>

            <div class="album-art-container" id="album-art-container">
                <div class="album-art" id="album-art">
                    <div class="record-grooves"></div>
                    <div class="center-label" id="record-label"></div>
                </div>
            </div>
            
            <div class="track-info">
                <h3 id="track-title">Energetic Waves</h3>
                <p id="track-artist">Moodify Original</p>
            </div>

            <div class="waveform-container" id="waveform-container">
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                    <div class="progress-glow" id="progress-glow"></div>
                </div>
                <div class="time-info">
                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="ctrl-btn" id="prev-btn" aria-label="Previous track">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" fill="currentColor"/></svg>
                </button>
                <button class="ctrl-btn play-btn" id="play-pause-btn" aria-label="Play or Pause">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="currentColor"/></svg>
                </button>
                <button class="ctrl-btn" id="next-btn" aria-label="Next track">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" fill="currentColor"/></svg>
                </button>
            </div>
        </aside>
    </div>

    <audio id="audio-player" src="songs/energetic.mp3" preload="auto"></audio>

    <script src="script.js" defer></script>
</body>
</html>
